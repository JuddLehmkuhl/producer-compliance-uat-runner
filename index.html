<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Producer Compliance — UAT Runner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================ TOKENS */
:root{
  --ink:#101826; --ink-2:#1b2738; --ink-soft:#33415a;
  --paper:#eef1f5; --panel:#ffffff; --panel-2:#f7f8fb;
  --line:#e2e6ee; --line-strong:#cdd4e0;
  --muted:#5c6678; --muted-2:#8a93a6;
  --primary:#3a3fd4; --primary-press:#2d31b0; --primary-soft:#ecedfb;
  --green:#15803d; --green-bg:#e7f4ec; --green-dot:#1f9d55;
  --amber:#b4690e; --amber-bg:#fbf0db; --amber-dot:#e08a14;
  --red:#b91c1c; --red-bg:#fbe9e9; --red-dot:#dc2626;
  --focus:#3a3fd4;
  --shadow-sm:0 1px 2px rgba(16,24,38,.06),0 1px 3px rgba(16,24,38,.04);
  --shadow-md:0 6px 20px -6px rgba(16,24,38,.18),0 2px 6px rgba(16,24,38,.06);
  --radius:14px; --radius-sm:9px;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --display:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,sans-serif;
  --rail:296px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--ink); background:var(--paper);
  font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
}
a{color:var(--primary)}
:focus-visible{outline:2.5px solid var(--focus); outline-offset:2px; border-radius:6px}
button{font-family:inherit}
::selection{background:#d9dbfa}

/* ============================================================ APP FRAME */
.app{display:grid; grid-template-columns:var(--rail) 1fr; min-height:100vh}

/* ------------------------------------------------ TOP BAR */
.topbar{
  grid-column:1/-1; position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:18px;
  height:60px; padding:0 22px;
  background:var(--ink); color:#fff; border-bottom:1px solid #000;
}
.brand{display:flex; align-items:center; gap:11px; font-family:var(--display); font-weight:700; letter-spacing:-.01em}
.brand .mark{
  width:26px; height:26px; border-radius:7px; flex:none; position:relative;
  background:conic-gradient(from -90deg,var(--red-dot) 0 33%,var(--amber-dot) 33% 66%,var(--green-dot) 66% 100%);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.14);
}
.brand .mark::after{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--ink)}
.brand b{font-size:15.5px}
.brand span{font-weight:500;color:#9aa4bd;font-family:var(--body);font-size:12.5px}
.topbar .spacer{flex:1}
/* readiness pill (signature) */
.verdict{
  display:flex; align-items:center; gap:10px; padding:6px 13px 6px 8px;
  border-radius:999px; background:#1d293f; border:1px solid #2c3a55;
  font-size:12.5px; color:#cbd3e3; font-weight:500;
}
.verdict .ring{width:30px;height:30px;flex:none}
.verdict b{font-family:var(--mono);font-weight:600;color:#fff;font-size:13px}
.verdict .lbl{color:#9aa4bd}
.syncbadge{font-size:12px;font-weight:600;color:var(--green-dot);background:rgba(31,157,85,.12);border:1px solid rgba(31,157,85,.3);padding:5px 11px;border-radius:999px;opacity:0;transform:translateY(-2px);transition:opacity .25s,transform .25s;white-space:nowrap}
.syncbadge.on{opacity:1;transform:none}
@media(max-width:880px){.syncbadge{display:none}}
.tb-btn{
  display:inline-flex;align-items:center;gap:7px; height:34px; padding:0 14px;
  border-radius:9px; border:1px solid #2c3a55; background:#1d293f; color:#e7ebf3;
  font-size:13px; font-weight:500; cursor:pointer; transition:background .15s,border-color .15s;
}
.tb-btn:hover{background:#26344e;border-color:#3a4a6a}
.tb-btn.primary{background:var(--primary);border-color:var(--primary)}
.tb-btn.primary:hover{background:var(--primary-press)}
.tb-btn svg{width:15px;height:15px}

/* ------------------------------------------------ SIDEBAR */
.rail{
  position:sticky; top:60px; align-self:start; height:calc(100vh - 60px);
  overflow-y:auto; background:var(--panel); border-right:1px solid var(--line);
  padding:18px 14px 40px;
}
.rail-progress{
  background:var(--panel-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:15px 15px 13px; margin-bottom:16px;
}
.rail-progress .rp-top{display:flex;align-items:center;gap:13px}
.rail-progress .ring{width:52px;height:52px;flex:none}
.rail-progress .rp-meta{min-width:0}
.rail-progress .rp-pct{font-family:var(--display);font-weight:700;font-size:20px;line-height:1}
.rail-progress .rp-sub{font-size:12px;color:var(--muted);margin-top:3px}
.rail-progress .rp-bar{height:6px;border-radius:99px;background:var(--line);margin-top:13px;overflow:hidden}
.rail-progress .rp-fill{height:100%;width:0;border-radius:99px;background:var(--red-dot);transition:width .5s cubic-bezier(.4,0,.2,1),background .5s}

.nav-label{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);padding:6px 10px 8px}
.nav-item{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  padding:9px 11px; border-radius:10px; border:1px solid transparent; background:none;
  cursor:pointer; color:var(--ink-soft); font-size:13.5px; font-weight:500; margin-bottom:2px;
  transition:background .12s,border-color .12s;
}
.nav-item:hover{background:var(--panel-2)}
.nav-item.active{background:var(--primary-soft);border-color:#d4d6f7;color:var(--ink)}
.nav-item .ni-id{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--muted);min-width:30px}
.nav-item.active .ni-id{color:var(--primary)}
.nav-item .ni-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item .ni-status{width:18px;height:18px;flex:none;display:grid;place-items:center}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line-strong)}
.dot.prog{background:var(--primary)}
.dot.pass{background:var(--green-dot)}
.dot.partial{background:var(--amber-dot)}
.dot.fail{background:var(--red-dot)}
.ni-check{width:17px;height:17px;color:var(--green)}
.nav-sep{height:1px;background:var(--line);margin:12px 6px}

/* ------------------------------------------------ MAIN */
.main{min-width:0;padding:30px clamp(20px,4vw,56px) 90px;max-width:1000px}
.view{animation:rise .35s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.eyebrow{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--primary)}
h1.title{font-family:var(--display);font-weight:700;font-size:clamp(26px,4vw,38px);line-height:1.08;letter-spacing:-.02em;margin:10px 0 0}
.lede{font-size:17px;color:var(--ink-soft);margin:16px 0 0;max-width:64ch}

/* HOME */
.home-hero{
  position:relative; overflow:hidden; border-radius:20px; padding:34px 34px 30px;
  background:linear-gradient(135deg,#141d31,#1f2c49 60%,#243457);
  color:#eef1f7; box-shadow:var(--shadow-md);
}
.home-hero .eyebrow{color:#b9c0fb}
.home-hero h1.title{color:#fff}
.home-hero .lede{color:#c4ccdb}
.home-hero .rag-strip{display:flex;gap:8px;margin-top:22px}
.rag-chip{display:inline-flex;align-items:center;gap:8px;padding:7px 13px;border-radius:99px;font-size:12.5px;font-weight:500;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}
.rag-chip i{width:9px;height:9px;border-radius:50%;flex:none}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px}
@media(max-width:760px){.home-grid{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm)}
.card h3{font-family:var(--display);font-weight:600;font-size:16px;margin:0 0 8px;letter-spacing:-.01em}
.card p{margin:0;color:var(--ink-soft);font-size:14px}
.card.warn{background:var(--amber-bg);border-color:#f0dcae}
.card.warn h3{color:var(--amber)}
.card ul{margin:8px 0 0;padding-left:18px;color:var(--ink-soft);font-size:14px}
.card ul li{margin:4px 0}
.mono-tag{font-family:var(--mono);font-size:.9em;background:#eef0f4;padding:1px 6px;border-radius:5px;border:1px solid var(--line)}

details.gloss{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);overflow:hidden}
details.gloss>summary{cursor:pointer;list-style:none;padding:15px 20px;font-family:var(--display);font-weight:600;font-size:15px;display:flex;align-items:center;gap:10px}
details.gloss>summary::-webkit-details-marker{display:none}
details.gloss>summary .chev{margin-left:auto;transition:transform .2s;color:var(--muted)}
details.gloss[open]>summary .chev{transform:rotate(90deg)}
.gloss-body{padding:4px 20px 18px;display:grid;grid-template-columns:1fr 1fr;gap:2px 26px}
@media(max-width:680px){.gloss-body{grid-template-columns:1fr}}
.gloss-body dl{margin:0;display:contents}
.gterm{padding:9px 0;border-top:1px solid var(--line);font-size:13.5px}
.gterm b{color:var(--ink);font-weight:600}
.gterm span{color:var(--muted)}

.start-row{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:9px;height:46px;padding:0 22px;border-radius:11px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);font-size:14.5px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .12s,box-shadow .12s,background .12s}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-press)}
.btn svg{width:17px;height:17px}

/* TEST HEADER */
.test-head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.id-chip{font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;background:var(--ink);padding:7px 12px;border-radius:9px;flex:none;margin-top:6px}
.test-meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:5px 12px}
.pill svg{width:14px;height:14px;opacity:.8}
.pill.tier{color:var(--primary);border-color:#d4d6f7;background:var(--primary-soft)}

.callout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
@media(max-width:720px){.callout{grid-template-columns:1fr}}
.callout .co{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--primary);border-radius:var(--radius-sm);padding:14px 16px}
.callout .co.why{border-left-color:var(--amber-dot)}
.callout .co .k{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2)}
.callout .co p{margin:5px 0 0;font-size:14px;color:var(--ink-soft)}

details.prereq{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel-2)}
details.prereq>summary{cursor:pointer;list-style:none;padding:13px 17px;font-weight:600;font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;gap:9px}
details.prereq>summary::-webkit-details-marker{display:none}
details.prereq .chev{transition:transform .2s;color:var(--muted)}
details.prereq[open] .chev{transform:rotate(90deg)}
details.prereq ul{margin:0;padding:2px 20px 16px 38px}
details.prereq li{margin:6px 0;font-size:13.5px;color:var(--ink-soft)}

/* PART HEADER */
.part-head{display:flex;align-items:center;gap:12px;margin:30px 0 6px}
.part-head .bar{height:1px;flex:1;background:var(--line)}
.part-head .lbl{font-family:var(--display);font-weight:600;font-size:13.5px;color:var(--ink-2);letter-spacing:-.01em}
.part-head .opt{font-size:11px;font-weight:600;color:var(--amber);background:var(--amber-bg);border:1px solid #f0dcae;padding:2px 8px;border-radius:99px}

/* STEPS */
.steps{margin-top:18px;display:flex;flex-direction:column;gap:11px}
.step{
  display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 17px;box-shadow:var(--shadow-sm);transition:border-color .15s,background .25s;
}
.step.done{background:var(--green-bg);border-color:#c4e3cf}
.step .check{
  appearance:none;-webkit-appearance:none;flex:none;width:24px;height:24px;margin-top:1px;
  border:2px solid var(--line-strong);border-radius:7px;background:#fff;cursor:pointer;position:relative;transition:.15s;
}
.step .check:hover{border-color:var(--primary)}
.step .check:checked{background:var(--green-dot);border-color:var(--green-dot)}
.step .check:checked::after{content:"";position:absolute;left:7px;top:3px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.step .body{min-width:0}
.step .s-idx{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--muted-2)}
.step.done .s-idx{color:var(--green)}
.step .opt-tag{font-size:10.5px;font-weight:600;color:var(--amber);background:var(--amber-bg);border:1px solid #f0dcae;padding:1px 7px;border-radius:99px;margin-left:8px;vertical-align:1px}
.step .action{margin:3px 0 0;font-size:14.5px;color:var(--ink);font-weight:500}
.step .action q{quotes:none}
.step .expect{margin:11px 0 0;padding:10px 13px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;font-size:13.5px;color:var(--ink-soft)}
.step .expect .ek{display:block;font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2);margin-bottom:3px}
.step.done .expect{background:rgba(255,255,255,.6);border-color:#cfe6d7}
.uilabel{font-family:var(--mono);font-size:.88em;font-weight:600;color:var(--ink);background:#eef0f6;padding:1px 6px;border-radius:5px;border:1px solid var(--line);white-space:nowrap}
.codeblock{position:relative;margin:11px 0 0}
.codeblock pre{margin:0;padding:13px 15px;background:var(--ink);color:#e7ecf5;border-radius:9px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.6}
.codeblock .copy{position:absolute;top:8px;right:8px;height:27px;padding:0 10px;border-radius:7px;border:1px solid #33415a;background:#1d293f;color:#cbd3e3;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.codeblock .copy:hover{background:#26344e}

/* RESULT + NOTES */
.section-h{font-family:var(--display);font-weight:600;font-size:15px;margin:30px 0 12px;display:flex;align-items:center;gap:9px;letter-spacing:-.01em}
.section-h .n{font-family:var(--mono);font-size:12px;color:var(--muted-2);font-weight:600}
.resultcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
.seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
.seg button{border:none;background:none;cursor:pointer;padding:8px 16px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:8px;transition:.12s}
.seg button .d{width:9px;height:9px;border-radius:50%;background:var(--line-strong)}
.seg button:hover{color:var(--ink)}
.seg button[data-v="pass"].on{background:var(--green-bg);color:var(--green)}
.seg button[data-v="pass"].on .d{background:var(--green-dot)}
.seg button[data-v="partial"].on{background:var(--amber-bg);color:var(--amber)}
.seg button[data-v="partial"].on .d{background:var(--amber-dot)}
.seg button[data-v="fail"].on{background:var(--red-bg);color:var(--red)}
.seg button[data-v="fail"].on .d{background:var(--red-dot)}
.field-lbl{font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 7px}
textarea,.txtin{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;resize:vertical;transition:border-color .15s}
textarea:focus,.txtin:focus{border-color:var(--primary);outline:none}
textarea{min-height:74px;line-height:1.5}

/* FEEDBACK */
.fb{display:flex;flex-direction:column;gap:18px}
.fb-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow-sm)}
.fb-q{font-size:14.5px;font-weight:500;color:var(--ink);margin:0 0 4px}
.fb-q .qn{font-family:var(--mono);font-weight:600;color:var(--primary);margin-right:7px}
.fb-scale{font-size:12.5px;color:var(--muted);margin:0 0 12px}
.rating{display:inline-flex;gap:7px}
.rating button{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel);font-family:var(--mono);font-weight:600;font-size:15px;color:var(--muted);cursor:pointer;transition:.12s}
.rating button:hover{border-color:var(--primary);color:var(--primary)}
.rating button.on{background:var(--primary);border-color:var(--primary);color:#fff;transform:scale(1.04)}
.yesno{display:inline-flex;gap:9px;margin-bottom:11px}
.yesno button{padding:9px 20px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel);font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.12s}
.yesno button:hover{border-color:var(--primary);color:var(--ink)}
.yesno button.on[data-v="yes"]{background:var(--green-bg);border-color:var(--green-dot);color:var(--green)}
.yesno button.on[data-v="no"]{background:var(--red-bg);border-color:var(--red-dot);color:var(--red)}

/* NAV FOOTER */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:38px;padding-top:22px;border-top:1px solid var(--line)}
.pager .btn{height:50px}
.pager .btn .sub{display:block;font-size:11px;font-weight:500;color:var(--muted);text-align:left}
.pager .btn.next{margin-left:auto;text-align:right}
.pager .btn.next .sub{text-align:right}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:.3s;z-index:80;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;color:var(--green-dot)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(16,24,38,.5);backdrop-filter:blur(2px);display:none;place-items:center;z-index:90;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--panel);border-radius:18px;box-shadow:var(--shadow-md);max-width:720px;width:100%;max-height:84vh;display:flex;flex-direction:column;overflow:hidden}
.modal header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal header h3{font-family:var(--display);font-weight:600;margin:0;font-size:18px;flex:1}
.modal .close{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel);cursor:pointer;display:grid;place-items:center;color:var(--muted)}
.modal .close:hover{background:var(--panel-2)}
.modal .mbody{padding:18px 24px;overflow:auto}
.modal .mbody p{margin:0 0 14px;color:var(--ink-soft);font-size:14px}
.modal pre.report{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;font-family:var(--mono);font-size:11.5px;line-height:1.55;max-height:38vh;overflow:auto;white-space:pre-wrap}
.modal footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

/* MOBILE */
.menu-btn{display:none}
@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .rail{position:fixed;top:60px;left:0;bottom:0;width:300px;z-index:50;transform:translateX(-103%);transition:transform .25s;box-shadow:var(--shadow-md)}
  .rail.open{transform:none}
  .menu-btn{display:inline-flex}
  .main{padding:22px 18px 80px}
  .verdict .lbl{display:none}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->

        "question": "After walking through all the safety gates (ACKNOWLEDGE-PROD typed-phrase requirement, autonomy case-sensitive whitelist, agent kill-switch, shadow-then-go guardrail, canary mode, environment bright-line), was anything unclear, hard to find, or something that would make you hesitate during a real production go-live?",
        "scale": ""
      }
    ]
  }
]
</script>

<script>
/* ============================================================ APP */
(function(){
  "use strict";
  const INTRO = JSON.parse(document.getElementById('intro-data').textContent);
  const TESTS = JSON.parse(document.getElementById('test-data').textContent);
  const KEY = 'pc-uat-runner-v1';
  const SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbyyQ9WxnfniY1nOVrVARkXAn9BFzeSV43-oYTpFJpmLI-94zsa-Z-e5t2uJ0DPv8tVlZg/exec'; // Apps Script web-app → Google Sheet (central results)
  const $ = (s,r=document)=>r.querySelector(s);
  const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
  const esc = s => String(s==null?'':s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

  // load/save state
  let state = {steps:{},results:{},notes:{},feedback:{},tester:'',sid:''};
  try{const s=JSON.parse(localStorage.getItem(KEY)); if(s&&typeof s==='object') state=Object.assign(state,s);}catch(e){}
  if(!state.sid) state.sid = 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  let saveT, subT;
  function save(){clearTimeout(saveT); saveT=setTimeout(()=>{try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} toast('Saved'); autoSubmit();},250);}

  /* ---------- central results capture (no backend; posts to a Google Sheet via Apps Script) ---------- */
  function submitEnabled(){ return !!SUBMIT_URL; }
  function payload(){
    const done=stepsDone(), pct=totalSteps?Math.round(done/totalSteps*100):0;
    const verdicts=TESTS.map(t=>t.id+':'+(state.results[t.id]||'-')).join(' ');
    return {sid:state.sid, tester:state.tester||'(unnamed)', progress:pct+'% ('+done+'/'+totalSteps+')', verdicts, state, ts:new Date().toISOString()};
  }
  function postResults(){ if(!submitEnabled()) return Promise.resolve();
    return fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload())}).catch(()=>{}); }
  function hasProgress(){ return Object.values(state.steps||{}).some(Boolean) || Object.keys(state.results||{}).length>0 || Object.values(state.notes||{}).some(v=>v&&String(v).trim()) || Object.keys(state.feedback||{}).length>0; }
  // capture ALWAYS once submission is enabled — even before a name is entered (unnamed rows are keyed by sid and get the name later)
  function autoSubmit(){ if(!submitEnabled()) return; clearTimeout(subT); subT=setTimeout(()=>{ postResults(); syncBadge(); },2500); }
  function submitNow(){ if(!submitEnabled()) return; postResults(); syncBadge(); toast(state.tester?'Sent to the team ✓':'Captured ✓ — add your name on the Start page so we know it’s you'); }
  let syncT; function syncBadge(){ const b=$('#syncBadge'); if(!b) return; b.textContent='✓ saved to team'; b.classList.add('on'); clearTimeout(syncT); syncT=setTimeout(()=>b.classList.remove('on'),1800); }

  const totalSteps = TESTS.reduce((n,t)=>n+t.steps.length,0);
  const stepsDone = ()=>Object.values(state.steps).filter(Boolean).length;
  const testStepsDone = t => t.steps.filter((_,i)=>state.steps[t.id+'.'+i]).length;

  // render quoted UI labels nicely: wrap "…" in .uilabel
  function fmt(s){
    let h = esc(s);
    h = h.replace(/&quot;([^&]*?)&quot;/g,'<span class="uilabel">$1</span>')
         .replace(/"([^"]*?)"/g,'<span class="uilabel">$1</span>')
         .replace(/`([^`]+?)`/g,'<span class="uilabel">$1</span>');
    return h;
  }

  /* ---------- progress rings ---------- */
  function ragColor(p){return p>=100?'var(--green-dot)':p>0?(p>=66?'var(--green-dot)':'var(--amber-dot)'):'var(--red-dot)';}
  function ring(svg,pct,track,stroke){
    const r=15.9155, c=2*Math.PI*r, off=c*(1-pct/100);
    svg.innerHTML=`<circle cx="18" cy="18" r="${r}" fill="none" stroke="${track}" stroke-width="3.4"/>
      <circle cx="18" cy="18" r="${r}" fill="none" stroke="${stroke}" stroke-width="3.4" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 18 18)"
      style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1),stroke .4s"/>`;
  }
  function updateProgress(){
    const done=stepsDone(), pct=totalSteps?Math.round(done/totalSteps*100):0;
    const col=pct>=100?'var(--green-dot)':pct>0?'var(--amber-dot)':'var(--red-dot)';
    ring($('#vRing'),pct,'#2c3a55','#fff');
    $('#vPct').textContent=pct+'%';
    $('#vLbl').textContent=pct>=100?'all cleared':pct>0?'in progress':'not started';
    ring($('#railRing'),pct,'var(--line)',col);
    $('#railPct').textContent=pct+'%';
    $('#railSub').textContent=done+' of '+totalSteps+' steps cleared';
    const f=$('#railFill'); f.style.width=pct+'%'; f.style.background=col;
  }

  /* ---------- sidebar ---------- */
  function testStatus(t){
    const r=state.results[t.id];
    if(r) return r; // pass/partial/fail
    const d=testStepsDone(t);
    if(d===0) return 'none';
    return d===t.steps.length ? 'doneSteps' : 'prog';
  }
  function buildNav(){
    const wrap=$('#navTests'); wrap.innerHTML='';
    TESTS.forEach(t=>{
      const b=el('button','nav-item'); b.dataset.nav=t.id;
      const st=testStatus(t);
      let statusEl;
      if(st==='pass'||st==='partial'||st==='fail') statusEl=`<span class="dot ${st}"></span>`;
      else if(st==='doneSteps') statusEl=`<svg class="ni-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>`;
      else if(st==='prog') statusEl=`<span class="dot prog"></span>`;
      else statusEl=`<span class="dot"></span>`;
      b.innerHTML=`<span class="ni-id">${t.id}</span><span class="ni-title">${esc(t.title)}</span><span class="ni-status">${statusEl}</span>`;
      wrap.appendChild(b);
    });
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.nav===current));
  }

  /* ---------- views ---------- */
  let current='home';
  function go(nav){current=nav; closeRail(); window.scrollTo(0,0); render(); buildNav();}

  function render(){
    const v=$('#view'); v.classList.remove('view'); void v.offsetWidth; v.classList.add('view');
    if(current==='home') return renderHome(v);
    if(current==='wrap') return renderWrap(v);
    const t=TESTS.find(x=>x.id===current); if(t) renderTest(v,t);
  }

  function renderHome(v){
    const g=INTRO.glossary.map(([term,def])=>`<div class="gterm"><b>${esc(term)}</b> — <span>${esc(def)}</span></div>`).join('');
    v.innerHTML=`
      <div class="home-hero">
        <div class="eyebrow">Internal UAT · PSA-Agent practice org</div>
        <h1 class="title">${esc(INTRO.title)}</h1>
        <p class="lede">${esc(INTRO.subtitle)}</p>
        <div class="rag-strip">
          <span class="rag-chip"><i style="background:var(--red-dot)"></i>Red — not ready</span>
          <span class="rag-chip"><i style="background:var(--amber-dot)"></i>Amber — in progress</span>
          <span class="rag-chip"><i style="background:var(--green-dot)"></i>Green — cleared</span>
        </div>
      </div>
      <div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:18px">
        <div style="flex:1;min-width:200px"><h3 style="margin-bottom:4px">Testing as</h3><p>${submitEnabled()?'Your name labels your results so the team can tell whose is whose — your progress posts to the shared results sheet automatically as you go.':'Your name labels your exported report.'}</p></div>
        <input class="txtin" id="testerName" style="max-width:280px;height:46px" placeholder="Your name" value="${esc(state.tester||'')}" autocomplete="off" />
      </div>
      <div class="home-grid">
        <div class="card"><h3>What you're testing</h3><p>${INTRO.what}</p></div>
        <div class="card"><h3>Your access (solo)</h3><p>${INTRO.access}</p></div>
      </div>
      <div class="home-grid">
        <div class="card warn"><h3>⚠ Practice environment</h3><p>Nothing here is real. Every check is simulated; confirmation numbers start with <span class="mono-tag">MOCK-</span>. If you ever see a confirmation that doesn't, stop and flag it.</p></div>
        <div class="card"><h3>How it works</h3><ul><li>Do tests in order — TC1 first.</li><li>Tick each step as you complete it.</li><li>Set a <b>Pass / Partly / Fail</b> verdict per test.</li><li>Answer the feedback — that's the real signal.</li><li>Hit <b>Export results</b> when done.</li></ul></div>
      </div>
      <details class="gloss"><summary>Mini-glossary <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></summary><div class="gloss-body">${g}</div></details>
      <div class="start-row"><button class="btn primary" id="startBtn">Start TC1 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></div>`;
    $('#startBtn').onclick=()=>go(TESTS[0].id);
    const tn=$('#testerName'); if(tn) tn.addEventListener('input',e=>{state.tester=e.target.value.trim(); save();});
  }

  function renderTest(v,t){
    const idx=TESTS.findIndex(x=>x.id===t.id);
    const prev=TESTS[idx-1], next=TESTS[idx+1];
    let stepsHtml='', lastPart=null;
    t.steps.forEach((s,i)=>{
      if(s.part && s.part!==lastPart){
        lastPart=s.part;
        stepsHtml+=`<div class="part-head"><span class="lbl">${esc(s.part)}</span>${s.optional?'<span class="opt">optional</span>':''}<span class="bar"></span></div>`;
      }
      const sid=t.id+'.'+i, done=!!state.steps[sid];
      const code=s.code?`<div class="codeblock"><button class="copy" data-code="${esc(s.code)}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>copy</button><pre>${esc(s.code)}</pre></div>`:'';
      stepsHtml+=`<div class="step${done?' done':''}" data-step="${sid}">
        <input type="checkbox" class="check" ${done?'checked':''} aria-label="Step ${i+1} done" data-sid="${sid}"/>
        <div class="body">
          <span class="s-idx">STEP ${i+1}${t.steps.filter(x=>x.part===s.part).length&&s.part?'':''}</span>${s.optional?'<span class="opt-tag">optional</span>':''}
          <p class="action">${fmt(s.action)}</p>
          ${code}
          <div class="expect"><span class="ek">Expected</span>${fmt(s.expect)}</div>
        </div></div>`;
    });
    const result=state.results[t.id]||'';
    const segBtn=(val,label)=>`<button data-v="${val}" class="${result===val?'on':''}"><span class="d"></span>${label}</button>`;
    const fbHtml=t.feedback.map((q,i)=>fbItem(t.id,i,q)).join('');
    const prereq=(t.prereqs&&t.prereqs.length)?`<details class="prereq"><summary><svg class="chev" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>Before you start (${t.prereqs.length})</summary><ul>${t.prereqs.map(p=>`<li>${fmt(p)}</li>`).join('')}</ul></details>`:'';

    v.innerHTML=`
      <div class="test-head">
        <span class="id-chip">${t.id}</span>
        <div style="flex:1;min-width:0">
          <div class="eyebrow">Test case · ${esc(t.tier)} tier</div>
          <h1 class="title">${esc(t.title)}</h1>
          <div class="test-meta">
            <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>~${t.estMin} min</span>
            <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><span data-stepcount="${t.id}">${testStepsDone(t)} / ${t.steps.length} steps</span></span>
            <span class="pill tier">${esc(t.tier)}</span>
          </div>
        </div>
      </div>
      <div class="callout">
        <div class="co"><span class="k">What you're checking</span><p>${fmt(t.whatChecking)}</p></div>
        <div class="co why"><span class="k">Why it matters</span><p>${fmt(t.whyMatters)}</p></div>
      </div>
      ${prereq}
      <h2 class="section-h">Steps <span class="n">${t.steps.length}</span></h2>
      <div class="steps">${stepsHtml}</div>
      <h2 class="section-h">Your verdict</h2>
      <div class="resultcard">
        <p class="field-lbl">How did this test go?</p>
        <div class="seg" data-result="${t.id}">${segBtn('pass','Pass')}${segBtn('partial','Partly')}${segBtn('fail','Fail')}</div>
        <p class="field-lbl" style="margin-top:18px">Notes (anything odd?)</p>
        <textarea data-note="${t.id}" placeholder="Bugs, confusing labels, slow moments, anything worth flagging…">${esc(state.notes[t.id]||'')}</textarea>
      </div>
      <h2 class="section-h">Your feedback <span class="n">${t.feedback.length}</span></h2>
      <div class="fb">${fbHtml}</div>
      <div class="pager">
        ${prev?`<button class="btn" data-go="${prev.id}"><span class="sub">← Previous</span>${esc(prev.id)}</button>`:`<button class="btn" data-go="home"><span class="sub">←</span>Start here</button>`}
        ${next?`<button class="btn next primary" data-go="${next.id}"><span class="sub">Next →</span>${esc(next.id)}</button>`:`<button class="btn next primary" data-go="wrap"><span class="sub">Finish →</span>Wrap-up</button>`}
      </div>`;
    wireTest(t);
  }

  function fbItem(tid,i,q){
    const fid=tid+'.'+i, val=state.feedback[fid];
    let ctrl='';
    if(q.kind==='rating'){
      let btns=''; for(let n=1;n<=5;n++) btns+=`<button data-r="${n}" class="${val&&val.rating==n?'on':''}">${n}</button>`;
      ctrl=`<div class="rating" data-fb="${fid}" data-kind="rating">${btns}</div>`;
    } else if(q.kind==='yesno'){
      ctrl=`<div class="yesno" data-fb="${fid}" data-kind="yesno">
        <button data-v="yes" class="${val&&val.yn==='yes'?'on':''}">Yes</button>
        <button data-v="no" class="${val&&val.yn==='no'?'on':''}">No</button></div>
        <textarea data-fbnote="${fid}" placeholder="Add detail (optional)…">${esc(val&&val.note||'')}</textarea>`;
    } else {
      ctrl=`<textarea data-fbtext="${fid}" placeholder="Your answer…">${esc(val&&val.text||'')}</textarea>`;
    }
    const scale=q.scale?`<p class="fb-scale">${esc(q.scale)}</p>`:'';
    return `<div class="fb-item"><p class="fb-q"><span class="qn">Q${i+1}</span>${fmt(q.question)}</p>${scale}${ctrl}</div>`;
  }

  function renderWrap(v){
    const fb=INTRO.wrap.map((q,i)=>fbItem('WRAP',i,q)).join('');
    const done=stepsDone(), pct=totalSteps?Math.round(done/totalSteps*100):0;
    const verdicts=TESTS.map(t=>{const r=state.results[t.id]; const cls=r||'none';
      const lbl=r?({pass:'Pass',partial:'Partly',fail:'Fail'})[r]:'—';
      return `<div class="pill" style="border-color:var(--line)"><span class="dot ${r||''}"></span><b style="font-family:var(--mono);font-weight:600;margin-right:2px">${t.id}</b> ${lbl}</div>`;}).join('');
    v.innerHTML=`
      <div class="eyebrow">Final</div>
      <h1 class="title">Wrap-up</h1>
      <p class="lede">${esc(done)} of ${esc(totalSteps)} steps cleared (${pct}%). A few questions about the feature as a whole, then export your results.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:20px">${verdicts}</div>
      <h2 class="section-h">Overall feedback <span class="n">${INTRO.wrap.length}</span></h2>
      <div class="fb">${fb}</div>
      <div class="start-row"><button class="btn primary" id="wrapExport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg> Export results</button>
        <button class="btn" id="resetBtn">Reset everything</button></div>`;
    wireFb(v);
    $('#wrapExport').onclick=openExport;
    $('#resetBtn').onclick=()=>{ if(confirm('Clear all progress, verdicts, and feedback? This cannot be undone.')){ state={steps:{},results:{},notes:{},feedback:{}}; localStorage.removeItem(KEY); go('home'); updateProgress(); } };
  }

  /* ---------- wiring ---------- */
  function wireTest(t){
    $('#view').querySelectorAll('.check').forEach(cb=>cb.addEventListener('change',e=>{
      const sid=e.target.dataset.sid; state.steps[sid]=e.target.checked;
      e.target.closest('.step').classList.toggle('done',e.target.checked);
      const sc=$('#view').querySelector(`[data-stepcount="${t.id}"]`); if(sc) sc.textContent=testStepsDone(t)+' / '+t.steps.length+' steps';
      save(); updateProgress(); buildNav();
    }));
    $('#view').querySelector(`[data-result="${t.id}"]`).querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      const v=b.dataset.v; state.results[t.id]=(state.results[t.id]===v)?'':v;
      $('#view').querySelector(`[data-result="${t.id}"]`).querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.v===state.results[t.id]));
      save(); buildNav();
    }));
    const note=$('#view').querySelector(`[data-note="${t.id}"]`);
    note.addEventListener('input',()=>{state.notes[t.id]=note.value; save();});
    wireFb($('#view'));
    $('#view').querySelectorAll('.codeblock .copy').forEach(c=>c.addEventListener('click',()=>{copy(c.dataset.code); toast('Code copied');}));
    $('#view').querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>go(b.dataset.go)));
  }
  function wireFb(scope){
    scope.querySelectorAll('[data-kind="rating"]').forEach(r=>r.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      const fid=r.dataset.fb, n=+b.dataset.r; state.feedback[fid]=Object.assign({},state.feedback[fid],{rating:(state.feedback[fid]&&state.feedback[fid].rating==n)?null:n});
      r.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.r===state.feedback[fid].rating)); save();
    })));
    scope.querySelectorAll('[data-kind="yesno"]').forEach(y=>y.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      const fid=y.dataset.fb, v=b.dataset.v; const cur=state.feedback[fid]||{}; cur.yn=(cur.yn===v)?'':v; state.feedback[fid]=cur;
      y.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.v===cur.yn)); save();
    })));
    scope.querySelectorAll('[data-fbnote]').forEach(ta=>ta.addEventListener('input',()=>{const fid=ta.dataset.fbnote; state.feedback[fid]=Object.assign({},state.feedback[fid],{note:ta.value}); save();}));
    scope.querySelectorAll('[data-fbtext]').forEach(ta=>ta.addEventListener('input',()=>{const fid=ta.dataset.fbtext; state.feedback[fid]=Object.assign({},state.feedback[fid],{text:ta.value}); save();}));
  }

  /* ---------- export ---------- */
  function buildReport(){
    const lines=[]; const done=stepsDone(), pct=totalSteps?Math.round(done/totalSteps*100):0;
    lines.push('# Producer Compliance — UAT Results');
    lines.push('','**Tester:** '+(state.tester||'(unnamed)')+'  ','**Org:** PSA-Agent (Demo/Mock)  ','**Progress:** '+done+' of '+totalSteps+' steps cleared ('+pct+'%)','');
    lines.push('| Test | Verdict | Steps | ','|---|---|---|');
    TESTS.forEach(t=>{const r=state.results[t.id]; lines.push('| '+t.id+' '+t.title.replace(/\|/g,'/')+' | '+(r?({pass:'✅ Pass',partial:'🟠 Partly',fail:'🔴 Fail'})[r]:'—')+' | '+testStepsDone(t)+'/'+t.steps.length+' |');});
    lines.push('');
    TESTS.forEach(t=>{
      lines.push('## '+t.id+': '+t.title);
      const r=state.results[t.id]; lines.push('**Verdict:** '+(r?({pass:'Pass',partial:'Partly',fail:'Fail'})[r]:'(not set)')+' — '+testStepsDone(t)+'/'+t.steps.length+' steps cleared');
      if(state.notes[t.id]) lines.push('**Notes:** '+state.notes[t.id]);
      t.feedback.forEach((q,i)=>{const f=state.feedback[t.id+'.'+i]||{}; let a='(blank)';
        if(q.kind==='rating') a=f.rating?f.rating+'/5':'(blank)';
        else if(q.kind==='yesno') a=(f.yn?f.yn.toUpperCase():'(blank)')+(f.note?' — '+f.note:'');
        else a=f.text||'(blank)';
        lines.push('- **Q'+(i+1)+'.** '+q.question+'  \n  → '+a);});
      lines.push('');
    });
    lines.push('## Overall wrap-up');
    INTRO.wrap.forEach((q,i)=>{const f=state.feedback['WRAP.'+i]||{}; let a='(blank)';
      if(q.kind==='rating') a=f.rating?f.rating+'/5':'(blank)'; else a=f.text||'(blank)';
      lines.push('- **'+q.question+'**  \n  → '+a);});
    return lines.join('\n');
  }
  function openExport(){ $('#reportText').textContent=buildReport(); $('#modal').classList.add('show'); }
  function download(name,text,type){const b=new Blob([text],{type}); const u=URL.createObjectURL(b); const a=el('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1500);}

  /* ---------- helpers ---------- */
  let toastT;
  function toast(msg){const t=$('#toast'); $('#toastMsg').textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1400);}
  function copy(text){ if(navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{}); else {const ta=el('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove();} }
  function closeRail(){$('#rail').classList.remove('open');}

  /* ---------- global wiring ---------- */
  // delegate so dynamically-rebuilt test nav items (TC1..TC8) stay clickable across re-renders
  $('#rail').addEventListener('click',e=>{const n=e.target.closest('.nav-item[data-nav]'); if(n) go(n.dataset.nav);});
  $('#menuBtn').onclick=()=>$('#rail').classList.toggle('open');
  $('#exportBtn').onclick=openExport;
  $('#modalClose').onclick=()=>$('#modal').classList.remove('show');
  $('#modal').addEventListener('click',e=>{if(e.target===$('#modal'))$('#modal').classList.remove('show');});
  $('#copyReport').onclick=()=>{copy(buildReport()); toast('Report copied');};
  $('#dlMd').onclick=()=>download('uat-results.md',buildReport(),'text/markdown');
  $('#dlJson').onclick=()=>download('uat-results.json',JSON.stringify(state,null,2),'application/json');
  if(submitEnabled()){ const st=$('#submitTeam'); st.style.display=''; st.onclick=submitNow;
    $('#modal').querySelector('.mbody p').textContent='Your results post to the shared team sheet automatically as you go. Hit “Submit to team” to send the latest right now, or download/copy a copy for yourself.'; }
  document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#modal').classList.remove('show');});

  buildNav(); updateProgress(); render();
  // on load: if this browser already has progress, capture it now — covers testers who worked
  // before central capture was enabled, or who never entered a name (so auto-submit had been skipped)
  if(submitEnabled() && hasProgress()){ postResults(); setTimeout(syncBadge,300); }
})();
</script>
</body>
</html>
